name: Bootstrapper x86/x64 Debug with Symbols

permissions:
  contents: write
  packages: write

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3
      
    - name: Find ATL/MFC Include Path
      shell: powershell
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        echo "VS_PATH=$vsPath" >> $env:GITHUB_ENV
        
        $atlInclude = (Get-ChildItem -Path "$vsPath\VC\Tools\MSVC\*\atlmfc\include" -Directory | Select-Object -First 1).FullName
        
        if ($atlInclude) {
          Write-Host "ATL include found at: $atlInclude"
          echo "ATL_INCLUDE=$atlInclude" >> $env:GITHUB_ENV
        } else {
          Write-Host "ERROR: ATL/MFC not found!"
          exit 1
        }
      
    - name: Setup vcpkg (x86)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg-x86'
        vcpkgGitCommitId: '7e19f3c64cb636ee21f41bfe8558a6dfaae6236f'
        vcpkgJsonGlob: 'vcpkg.json'
        runVcpkgInstall: '--triplet=x86-windows-static --x-wait-for-lock'

    - name: Setup vcpkg (x64)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg-x64'
        vcpkgGitCommitId: '7e19f3c64cb636ee21f41bfe8558a6dfaae6236f'
        vcpkgJsonGlob: 'vcpkg.json'
        runVcpkgInstall: '--triplet=x64-windows-static --x-wait-for-lock'
        
    - name: Set vcpkg Environment (x86)
      run: |
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg-x86" >> $env:GITHUB_ENV
        echo "VCPKG_DEFAULT_TRIPLET=x86-windows-static" >> $env:GITHUB_ENV
        echo "CMAKE_WARN_UNUSED_CLI_VARS=OFF" >> $env:GITHUB_ENV
        echo "VCPKG_CMAKE_CONFIGURE_OPTIONS=-DCMAKE_WARN_UNUSED_CLI_VARS=OFF" >> $env:GITHUB_ENV

    - name: Set vcpkg Environment (x64)
      run: |
        echo "VCPKG_ROOT_X64=${{ github.workspace }}/vcpkg-x64" >> $env:GITHUB_ENV
        echo "VCPKG_DEFAULT_TRIPLET_X64=x64-windows-static" >> $env:GITHUB_ENV

    - name: Integrate vcpkg with MSBuild (x86)
      run: |
        & "${{ github.workspace }}/vcpkg-x86/vcpkg.exe" integrate install

    - name: Integrate vcpkg with MSBuild (x64)
      run: |
        & "${{ github.workspace }}/vcpkg-x64/vcpkg.exe" integrate install
        
    - name: Build Solution (x86) with Debug Symbols
      shell: cmd
      run: |
        msbuild "Installer.sln" /p:Configuration=Debug /p:Platform=Win32 /p:VcpkgEnabled=true /p:VcpkgUseStatic=true /p:VcpkgTriplet=x86-windows-static /p:VcpkgRoot="${{ github.workspace }}/vcpkg-x86" /p:GenerateFullPaths=true /p:DebugSymbols=true /p:DebugType=full /p:Optimize=false /p:LanguageStandard=stdcpp17

    - name: Build Solution (x64) with Debug Symbols
      shell: cmd
      run: |
        msbuild "Installer.sln" /p:Configuration=Debug /p:Platform=x64 /p:VcpkgEnabled=true /p:VcpkgUseStatic=true /p:VcpkgTriplet=x64-windows-static /p:VcpkgRoot="${{ github.workspace }}/vcpkg-x64" /p:GenerateFullPaths=true /p:DebugSymbols=true /p:DebugType=full /p:Optimize=false /p:LanguageStandard=stdcpp17
        
    - name: Verify Executables and PDBs Exist
      run: |
        $x86ExeExists = Test-Path "BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.exe"
        $x86PdbExists = Test-Path "BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.pdb"
        $x64ExeExists = Test-Path "BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.exe"
        $x64PdbExists = Test-Path "BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.pdb"

        if ($x86ExeExists) {
          Write-Host "PekoraPlayerLauncher.exe (x86) built successfully!"
          Get-Item "BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.exe" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "ERROR: PekoraPlayerLauncher.exe (x86) not found!"
          exit 1
        }

        if ($x86PdbExists) {
          Write-Host "PekoraPlayerLauncher.pdb (x86) generated successfully!"
          Get-Item "BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.pdb" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "WARNING: PekoraPlayerLauncher.pdb (x86) not found!"
        }

        if ($x64ExeExists) {
          Write-Host "PekoraPlayerLauncher.exe (x64) built successfully!"
          Get-Item "BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.exe" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "ERROR: PekoraPlayerLauncher.exe (x64) not found!"
          exit 1
        }

        if ($x64PdbExists) {
          Write-Host "PekoraPlayerLauncher.pdb (x64) generated successfully!"
          Get-Item "BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.pdb" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "WARNING: PekoraPlayerLauncher.pdb (x64) not found!"
        }

        if (-not $x86ExeExists -and -not $x64ExeExists) {
          Write-Host "No executables found!"
          Get-ChildItem -Recurse -Name "*.exe" | ForEach-Object { Write-Host "Found: $_" }
          exit 1
        }
        
    - name: Upload Build Artifacts (x86) with PDB
      uses: actions/upload-artifact@v4
      with:
        name: PekoraPlayerLauncher-x86-Debug
        path: |
          BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.exe
          BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.pdb
        retention-days: 30

    - name: Upload Build Artifacts (x64) with PDB
      uses: actions/upload-artifact@v4
      with:
        name: PekoraPlayerLauncher-x64-Debug
        path: |
          BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.exe
          BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.pdb
        retention-days: 30
        
    - name: Create Release Package (x86) with Symbols
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        $zipName = "PekoraPlayerLauncher-x86-Debug-Symbols.zip"
        New-Item -ItemType Directory -Path "release-package-x86" -Force
        Copy-Item "BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.exe" "release-package-x86\"
        Copy-Item "BootstrapperClient\bin\Debug\Win32\PekoraPlayerLauncher.pdb" "release-package-x86\" -ErrorAction SilentlyContinue
        Compress-Archive -Path "release-package-x86\*" -DestinationPath $zipName -Force
        Write-Host "Created Debug Package: $zipName"
        Get-Item $zipName | Select-Object Name, Length

    - name: Create Release Package (x64) with Symbols
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        $zipName = "PekoraPlayerLauncher-x64-Debug-Symbols.zip"
        New-Item -ItemType Directory -Path "release-package-x64" -Force
        Copy-Item "BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.exe" "release-package-x64\"
        Copy-Item "BootstrapperClient\bin\Debug\x64\PekoraPlayerLauncher.pdb" "release-package-x64\" -ErrorAction SilentlyContinue
        Compress-Archive -Path "release-package-x64\*" -DestinationPath $zipName -Force
        Write-Host "Created Debug Package: $zipName"
        Get-Item $zipName | Select-Object Name, Length

    - name: Upload Release Package (x86)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: actions/upload-artifact@v4
      with:
        name: Release-Package-x86-Debug
        path: "PekoraPlayerLauncher-x86-Debug-Symbols.zip"
        retention-days: 90

    - name: Upload Release Package (x64)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: actions/upload-artifact@v4
      with:
        name: Release-Package-x64-Debug
        path: "PekoraPlayerLauncher-x64-Debug-Symbols.zip"
        retention-days: 90

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.7.0.4-debug
        release_name: "Debug Build 1.7.0.4 with Symbols"
        body: |
          ## Debug Build 1.7.0.4 with Debug Symbols
          
          **Build Type:** Debug (with full debug symbols)
          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}
          **Platforms:** Windows x86 (32-bit) and x64 (64-bit)
          
          ### Included Files:
          - Executable (.exe)
          - Debug Symbols (.pdb)
          
          ### Note:
          This build includes full debug symbols and is not optimized.
          Use for debugging and development purposes only.

    - name: Upload Release Asset (x86)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: PekoraPlayerLauncher-x86-Debug-Symbols.zip
        asset_name: PekoraPlayerLauncher-x86-Debug-Symbols.zip
        asset_content_type: application/zip

    - name: Upload Release Asset (x64)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: PekoraPlayerLauncher-x64-Debug-Symbols.zip
        asset_name: PekoraPlayerLauncher-x64-Debug-Symbols.zip
        asset_content_type: application/zip
